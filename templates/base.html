<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотечная система</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #2c3e50;
        }
        .sidebar .nav-link {
            color: #ecf0f1;
            padding: 12px 20px;
            margin: 2px 0;
            border-radius: 5px;
        }
        .sidebar .nav-link:hover {
            background-color: #34495e;
        }
        .sidebar .nav-link.active {
            background-color: #3498db;
        }
        .sidebar .nav-link i {
            width: 25px;
            margin-right: 10px;
        }
        .content {
            padding: 20px;
            background-color: #f5f7fa;
            min-height: 100vh;
        }
        .stats-card {
            transition: transform 0.2s;
            border: none;
            border-radius: 10px;
        }
        .stats-card:hover {
            transform: translateY(-5px);
        }
        .flash-messages {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            min-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white bg-dark">
                    <h5><i class="fas fa-book me-2"></i>Библиотека</h5>
                    <small>Система управления</small>
                </div>
                <nav class="nav flex-column p-2">
                    <a class="nav-link" href="/">
                        <i class="fas fa-tachometer-alt"></i> Дашборд
                    </a>
                    <a class="nav-link" href="/books">
                        <i class="fas fa-book"></i> Книги
                    </a>
                    <a class="nav-link" href="/authors">
                        <i class="fas fa-user-pen"></i> Авторы
                    </a>
                    <a class="nav-link" href="/readers">
                        <i class="fas fa-users"></i> Читатели
                    </a>
                    <a class="nav-link" href="/employees">
                        <i class="fas fa-id-card"></i> Сотрудники
                    </a>
                    <a class="nav-link" href="/loans">
                        <i class="fas fa-exchange-alt"></i> Выдачи
                    </a>
                    <a class="nav-link" href="/reports">
                        <i class="fas fa-chart-bar"></i> Отчеты
                    </a>
                </nav>
            </div>
            
            <!-- Main content -->
            <div class="col-md-10 content">
                <!-- Flash messages -->
                <div class="flash-messages">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                </div>
                
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
