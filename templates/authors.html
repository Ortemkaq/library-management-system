{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="fas fa-user-pen me-2"></i>Авторы</h2>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addAuthorModal">
        <i class="fas fa-plus"></i> Добавить автора
    </button>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>ФИО</th>
                <th>Год рождения</th>
                <th>Страна</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for author in authors %}
            <tr>
                <td>{{ author.id }}</td>
                <td><strong>{{ author.full_name }}</strong></td>
                <td>{{ author.birth_year or '-' }}</td>
                <td>{{ author.country or '-' }}</td>
                <td>
                    <a href="/authors/delete/{{ author.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить автора?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Modal добавления -->
<div class="modal fade" id="addAuthorModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" action="/authors/add">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Добавление автора</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2">
                        <label>ФИО <span class="text-danger">*</span></label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label>Год рождения</label>
                            <input type="number" name="birth_year" class="form-control" placeholder="1828">
                        </div>
                        <div class="col-md-6">
                            <label>Страна</label>
                            <input type="text" name="country" class="form-control" placeholder="Россия">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
