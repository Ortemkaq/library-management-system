{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header bg-primary text-white">
        <h5 class="mb-0"><i class="fas fa-hand-holding me-2"></i>Выдача книги</h5>
    </div>
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Читатель <span class="text-danger">*</span></label>
                <select name="reader_id" class="form-select" required>
                    <option value="">-- выберите читателя --</option>
                    {% for reader in readers %}
                    <option value="{{ reader.id }}">{{ reader.full_name }}</option>
                    {% endfor %}
                </select>
                <small class="text-muted">Только активные читатели</small>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Книга <span class="text-danger">*</span></label>
                <select name="book_id" class="form-select" required>
                    <option value="">-- выберите книгу --</option>
                    {% for book in books %}
                    <option value="{{ book.id }}">
                        {{ book.title }} (доступно: {{ book.available_copies }} экз.)
                    </option>
                    {% endfor %}
                </select>
                <small class="text-muted">Только книги в наличии</small>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Сотрудник <span class="text-danger">*</span></label>
                <select name="employee_id" class="form-select" required>
                    <option value="">-- выберите сотрудника --</option>
                    {% for emp in employees %}
                    <option value="{{ emp.id }}">{{ emp.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Срок выдачи (дней)</label>
                <input type="number" name="due_days" class="form-control" value="14" min="1" max="60">
                <small class="text-muted">По умолчанию книга выдается на 14 дней</small>
            </div>
            
            <hr>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Выдать книгу
            </button>
            <a href="/loans" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
